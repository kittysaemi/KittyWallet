services:
  postgres:
    image: postgres:16-alpine
    container_name: kittywallet-postgres
    restart: unless-stopped
    env_file:
      - ${KITTYWALLET_ENV_FILE:-.env.production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${KITTYWALLET_API_IMAGE}
    container_name: kittywallet-backend
    restart: unless-stopped
    env_file:
      - ${KITTYWALLET_ENV_FILE:-.env.production}
    environment:
      OCR_PROVIDER: ${OCR_PROVIDER:-paddle}
      PADDLE_OCR_URL: http://ocr:8000
      OCR_TIMEOUT_MS: ${OCR_TIMEOUT_MS:-45000}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      ocr:
        condition: service_healthy

  ocr:
    image: ${KITTYWALLET_OCR_IMAGE}
    container_name: kittywallet-ocr
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    environment:
      PADDLE_OCR_USE_DOC_ORIENTATION: ${PADDLE_OCR_USE_DOC_ORIENTATION:-true}
      PADDLE_OCR_USE_DOC_UNWARPING: ${PADDLE_OCR_USE_DOC_UNWARPING:-false}
      PADDLE_OCR_USE_TEXTLINE_ORIENTATION: ${PADDLE_OCR_USE_TEXTLINE_ORIENTATION:-false}
      PADDLE_OCR_DETECTION_MODEL: ${PADDLE_OCR_DETECTION_MODEL:-PP-OCRv5_mobile_det}
      PADDLE_OCR_RECOGNITION_MODEL: ${PADDLE_OCR_RECOGNITION_MODEL:-korean_PP-OCRv5_mobile_rec}
      OCR_INFERENCE_TIMEOUT: ${OCR_INFERENCE_TIMEOUT:-30}
    volumes:
      - paddle-models:/root/.paddlex

  frontend:
    image: ${KITTYWALLET_WEB_IMAGE}
    container_name: kittywallet-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: kittywallet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/www:/var/www/certbot:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot:v3.1.0
    container_name: kittywallet-certbot
    volumes:
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt

volumes:
  postgres-data:
  paddle-models:
