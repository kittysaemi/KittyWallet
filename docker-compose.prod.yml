services:
  postgres:
    image: postgres:16-alpine
    container_name: kittywallet-postgres
    restart: unless-stopped
    env_file:
      - ${KITTYWALLET_ENV_FILE:-.env.production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${KITTYWALLET_API_IMAGE}
    container_name: kittywallet-backend
    restart: unless-stopped
    env_file:
      - ${KITTYWALLET_ENV_FILE:-.env.production}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${KITTYWALLET_WEB_IMAGE}
    container_name: kittywallet-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: kittywallet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/www:/var/www/certbot:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot:v3.1.0
    container_name: kittywallet-certbot
    volumes:
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt

volumes:
  postgres-data:
