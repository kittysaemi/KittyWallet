services:
  postgres:
    image: postgres:16-alpine
    container_name: kittywallet-postgres
    environment:
      POSTGRES_DB: kittywallet
      POSTGRES_USER: kittywallet
      POSTGRES_PASSWORD: kittywallet
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kittywallet -d kittywallet"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: kittywallet-backend
    env_file:
      - ${KITTYWALLET_ENV_FILE:-.env.example}
    environment:
      DATABASE_URL: postgresql://kittywallet:kittywallet@postgres:5432/kittywallet?schema=public
      OCR_PROVIDER: ${OCR_PROVIDER:-paddle}
      PADDLE_OCR_URL: http://ocr:8000
      OCR_TIMEOUT_MS: ${OCR_TIMEOUT_MS:-25000}
    ports:
      - "3700:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ocr:
        condition: service_healthy

  ocr:
    build:
      context: .
      dockerfile: apps/ocr-service/Dockerfile
    container_name: kittywallet-ocr
    mem_limit: 2g
    memswap_limit: 2g
    environment:
      PADDLE_OCR_USE_DOC_ORIENTATION: ${PADDLE_OCR_USE_DOC_ORIENTATION:-true}
      PADDLE_OCR_USE_DOC_UNWARPING: ${PADDLE_OCR_USE_DOC_UNWARPING:-true}
      PADDLE_OCR_USE_TEXTLINE_ORIENTATION: ${PADDLE_OCR_USE_TEXTLINE_ORIENTATION:-false}
      PADDLE_OCR_DETECTION_MODEL: ${PADDLE_OCR_DETECTION_MODEL:-PP-OCRv5_mobile_det}
      PADDLE_OCR_RECOGNITION_MODEL: ${PADDLE_OCR_RECOGNITION_MODEL:-korean_PP-OCRv5_mobile_rec}
      OCR_INFERENCE_TIMEOUT: ${OCR_INFERENCE_TIMEOUT:-30}
      OCR_MAX_SIDE: ${OCR_MAX_SIDE:-2000}
    volumes:
      - paddle-models:/root/.paddlex

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: kittywallet-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: kittywallet-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/www:/var/www/certbot:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot:v3.1.0
    container_name: kittywallet-certbot
    volumes:
      - ./infra/certbot/www:/var/www/certbot
      - ./infra/certbot/conf:/etc/letsencrypt

volumes:
  postgres-data:
  paddle-models:
