services:
  postgres:
    image: postgres:16-alpine
    container_name: kittywallet-postgres
    environment:
      POSTGRES_DB: kittywallet
      POSTGRES_USER: kittywallet
      POSTGRES_PASSWORD: kittywallet
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kittywallet -d kittywallet"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: kittywallet-backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://kittywallet:kittywallet@postgres:5432/kittywallet?schema=public
    ports:
      - "3700:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: kittywallet-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: kittywallet-nginx
    ports:
      - "30080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
