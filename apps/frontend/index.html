<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fda5e3" />
    <link id="favicon-ico" rel="icon" type="image/x-icon" href="/kittywallet/icons/themes/pink/favicon/favicon.ico" />
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32" href="/kittywallet/icons/themes/pink/favicon/favicon-32x32.png" />
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16" href="/kittywallet/icons/themes/pink/favicon/favicon-16x16.png" />
    <link id="apple-touch-icon" rel="apple-touch-icon" href="/kittywallet/icons/themes/pink/apple-touch/apple-touch-icon.png" />
    <title>KittyWallet</title>
    <script>
      (function () {
        try {
          var m = { 'cat-pink': 'pink', 'mint': 'mint', 'lavender': 'purple' };
          var folder = m[localStorage.getItem('kw_theme')] || 'pink';
          document.cookie = 'kw_theme=' + folder + '; path=/; SameSite=Lax; max-age=31536000';
          // iOS WebKit은 JS로 동적 파비콘 변경이 불가하므로 파싱 시점에 올바른 테마로 교체.
          // iPad Pro는 userAgent가 MacIntel로 표시되어 maxTouchPoints로 구분.
          var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
          if (isIOS && folder !== 'pink') {
            var base = '/kittywallet/icons/themes/' + folder;
            var links = [
              ['favicon-ico', base + '/favicon/favicon.ico'],
              ['favicon-32', base + '/favicon/favicon-32x32.png'],
              ['favicon-16', base + '/favicon/favicon-16x16.png'],
              ['apple-touch-icon', base + '/apple-touch/apple-touch-icon.png']
            ];
            for (var i = 0; i < links.length; i++) {
              var el = document.getElementById(links[i][0]);
              if (el) el.setAttribute('href', links[i][1]);
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
