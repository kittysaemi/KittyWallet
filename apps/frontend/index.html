<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fda5e3" />
    <link id="favicon-ico" rel="icon" type="image/x-icon" href="/kittywallet/icons/themes/pink/favicon/favicon.ico" />
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32" href="/kittywallet/icons/themes/pink/favicon/favicon-32x32.png" />
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16" href="/kittywallet/icons/themes/pink/favicon/favicon-16x16.png" />
    <link id="apple-touch-icon" rel="apple-touch-icon" href="/kittywallet/icons/themes/pink/apple-touch/apple-touch-icon.png" />
    <title>KittyWallet</title>
    <script>
      (function () {
        try {
          var m = { 'cat-pink': 'pink', 'mint': 'mint', 'lavender': 'purple' };
          var folder = m[localStorage.getItem('kw_theme')] || 'pink';
          var el = document.querySelector('link[rel="manifest"]');
          if (el) {
            el.id = 'manifest-link';
            el.href = '/kittywallet/api/v1/manifest?theme=' + folder;
          } else {
            var link = document.createElement('link');
            link.id = 'manifest-link';
            link.rel = 'manifest';
            link.href = '/kittywallet/api/v1/manifest?theme=' + folder;
            document.head.appendChild(link);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
