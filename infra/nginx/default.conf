upstream kittywallet_backend {
  server backend:3000;
  keepalive 32;
}

upstream kittywallet_frontend {
  server frontend:80;
  keepalive 16;
}

server {
  listen 80;
  server_name kittysaemi.com www.kittysaemi.com kittysaemi.kr www.kittysaemi.kr;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://kittysaemi.com$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name www.kittysaemi.com kittysaemi.kr www.kittysaemi.kr;

  ssl_certificate /etc/letsencrypt/live/kittysaemi.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kittysaemi.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  return 301 https://kittysaemi.com$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name kittysaemi.com;

  ssl_certificate /etc/letsencrypt/live/kittysaemi.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/kittysaemi.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml
    text/css
    text/plain;

  location = /kittywallet {
    return 301 /kittywallet/;
  }

  location /kittywallet/api/ {
    proxy_pass http://kittywallet_backend/api/;
    proxy_http_version 1.1;
    client_max_body_size 25m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    # OCR may take up to OCR_TIMEOUT_MS (45 seconds by default). Keep the
    # proxy timeout longer so Nginx does not terminate a valid OCR request.
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    add_header Cache-Control "no-store" always;
  }

  location ~* ^/kittywallet/(sw\.js|workbox-.*\.js)$ {
    rewrite ^/kittywallet/(.*)$ /$1 break;
    proxy_pass http://kittywallet_frontend;
    proxy_set_header Host $host;
    add_header Cache-Control "no-cache" always;
  }

  location ~* ^/kittywallet/(.*\.(?:css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?))$ {
    rewrite ^/kittywallet/(.*)$ /$1 break;
    proxy_pass http://kittywallet_frontend;
    proxy_set_header Host $host;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location /kittywallet/ {
    proxy_pass http://kittywallet_frontend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection "";
    add_header Cache-Control "no-cache" always;
  }

  location / {
    return 404;
  }
}
