name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  API_IMAGE_NAME: kittywallet-api
  WEB_IMAGE_NAME: kittywallet-web

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api-image: ${{ steps.image-tags.outputs.api-image }}
      web-image: ${{ steps.image-tags.outputs.web-image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image-tags
        run: |
          API_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/${API_IMAGE_NAME}:${GITHUB_SHA}"
          WEB_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/${WEB_IMAGE_NAME}:${GITHUB_SHA}"
          echo "api-image=${API_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "web-image=${WEB_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "API_IMAGE=${API_IMAGE}" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=${WEB_IMAGE}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    environment:
      name: production
      url: https://kittysaemi.com
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH PRODUCTION_ENV_FILE; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deployment secret::$name is required."
              missing=1
            fi
          done
          exit "$missing"

      - name: Upload deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.prod.yml,infra/nginx/default.conf,infra/certbot/README.md"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api-image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web-image }}
          APP_ENV: ${{ secrets.PRODUCTION_ENV_FILE }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: API_IMAGE,WEB_IMAGE,APP_ENV,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            mkdir -p infra/certbot/conf infra/certbot/www
            printf '%s' "$APP_ENV" > .env.production.raw
            grep -Ev '^(KITTYWALLET_API_IMAGE|KITTYWALLET_WEB_IMAGE)=' .env.production.raw > .env.production
            rm .env.production.raw
            {
              echo "KITTYWALLET_API_IMAGE=$API_IMAGE"
              echo "KITTYWALLET_WEB_IMAGE=$WEB_IMAGE"
            } >> .env.production
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d
            docker compose --env-file .env.production -f docker-compose.prod.yml exec -T backend npm run prisma:migrate
            docker compose --env-file .env.production -f docker-compose.prod.yml ps

      - name: Health check
        run: curl --fail --retry 10 --retry-delay 5 https://kittysaemi.com/api/v1/health

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice title=KittyWallet deployment::Production deployment succeeded."
          else
            echo "::error title=KittyWallet deployment::Production deployment failed."
          fi
