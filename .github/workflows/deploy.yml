name: Deploy

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  API_IMAGE_NAME: kittywallet-api
  WEB_IMAGE_NAME: kittywallet-web
  OCR_IMAGE_NAME: kittywallet-ocr

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api-image: ${{ steps.image-tags.outputs.api-image }}
      web-image: ${{ steps.image-tags.outputs.web-image }}
      ocr-image: ${{ steps.image-tags.outputs.ocr-image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image-tags
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          if [ "${{ github.event_name }}" = "release" ]; then
            IMAGE_TAG="${{ github.event.release.tag_name }}"
          fi
          API_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/${API_IMAGE_NAME}:${IMAGE_TAG}"
          WEB_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/${WEB_IMAGE_NAME}:${IMAGE_TAG}"
          OCR_IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/${OCR_IMAGE_NAME}:${IMAGE_TAG}"
          echo "api-image=${API_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "web-image=${WEB_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ocr-image=${OCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "API_IMAGE=${API_IMAGE}" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=${WEB_IMAGE}" >> "$GITHUB_ENV"
          echo "OCR_IMAGE=${OCR_IMAGE}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE }}

      - name: Build and push OCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ocr-service/Dockerfile
          push: true
          tags: ${{ env.OCR_IMAGE }}

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    environment:
      name: production
      url: https://kittysaemi.com
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Validate deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH PRODUCTION_ENV_FILE; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deployment secret::$name is required."
              missing=1
            fi
          done
          exit "$missing"

      - name: Free Docker disk space before upload
        uses: appleboy/ssh-action@v1.2.0
        env:
          MIN_DEPLOY_FREE_SPACE_MB: 1024
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: MIN_DEPLOY_FREE_SPACE_MB
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            free_space_mb() {
              df -Pm / | awk 'NR == 2 { print $4 }'
            }

            echo "== Docker disk usage before cleanup =="
            df -h /
            docker system df

            # Preserve images used by running containers and remove only old
            # KittyWallet release images. This avoids deleting another service's
            # images, volumes, or containers from the shared Docker host.
            running_images="$(docker ps --format '{{.Image}}' | sort -u)"
            docker image ls --format '{{.Repository}}:{{.Tag}} {{.ID}}' |
              awk '$1 ~ /^ghcr\.io\/kittysaemi\/kittywallet-(api|web|ocr):/ { print $1, $2 }' |
              while read -r image _; do
                if ! printf '%s\n' "$running_images" | grep -Fxq "$image"; then
                  echo "Removing unused KittyWallet image: $image"
                  docker image rm "$image" || true
                fi
              done

            free_mb="$(free_space_mb)"
            echo "Free disk space after cleanup: ${free_mb}MB"
            if [ "$free_mb" -lt "$MIN_DEPLOY_FREE_SPACE_MB" ]; then
              echo "::error title=Insufficient deploy disk space::${free_mb}MB free; ${MIN_DEPLOY_FREE_SPACE_MB}MB is required after safe cleanup."
              exit 1
            fi

      - name: Upload deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.prod.yml,infra/nginx/default.conf,infra/certbot/README.md"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api-image }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web-image }}
          OCR_IMAGE: ${{ needs.build-and-push.outputs.ocr-image }}
          APP_ENV: ${{ secrets.PRODUCTION_ENV_FILE }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: API_IMAGE,WEB_IMAGE,OCR_IMAGE,APP_ENV,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            mkdir -p infra/certbot/conf infra/certbot/www
            printf '%s' "$APP_ENV" > .env.production.raw
            grep -Ev '^(KITTYWALLET_API_IMAGE|KITTYWALLET_WEB_IMAGE|KITTYWALLET_OCR_IMAGE)=' .env.production.raw > .env.production
            rm .env.production.raw
            {
              echo "KITTYWALLET_API_IMAGE=$API_IMAGE"
              echo "KITTYWALLET_WEB_IMAGE=$WEB_IMAGE"
              echo "KITTYWALLET_OCR_IMAGE=$OCR_IMAGE"
            } >> .env.production
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d
            docker compose --env-file .env.production -f docker-compose.prod.yml exec -T backend npm run db:migrate
            docker compose --env-file .env.production -f docker-compose.prod.yml exec -T backend npm run db:seed
            docker compose --env-file .env.production -f docker-compose.prod.yml ps

      - name: Health check
        run: |
          curl --fail --retry 10 --retry-delay 5 https://kittysaemi.com/kittywallet/api/v1/health
          curl --fail --retry 10 --retry-delay 5 https://kittysaemi.com/kittywallet/api/v1/health/db

      - name: Free Docker disk space after successful deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "== Docker disk usage before post-deploy cleanup =="
            df -h /
            docker system df

            running_images="$(docker ps --format '{{.Image}}' | sort -u)"
            docker image ls --format '{{.Repository}}:{{.Tag}} {{.ID}}' |
              awk '$1 ~ /^ghcr\.io\/kittysaemi\/kittywallet-(api|web|ocr):/ { print $1, $2 }' |
              while read -r image _; do
                if ! printf '%s\n' "$running_images" | grep -Fxq "$image"; then
                  echo "Removing unused KittyWallet image after deploy: $image"
                  docker image rm "$image" || true
                fi
              done

            echo "== Docker disk usage after post-deploy cleanup =="
            df -h /
            docker system df

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice title=KittyWallet deployment::Production deployment succeeded."
          else
            echo "::error title=KittyWallet deployment::Production deployment failed."
          fi
